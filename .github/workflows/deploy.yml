name: Build & Deploy

on:
  push:
    branches: ['**']   # любой пуш на любую ветку

# Разрешаем деплой на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Один активный деплой за раз (отменяет предыдущий в очереди, но не текущий)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── JOB 1: Build + Test (на ЛЮБОЙ ветке) ───────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npx vite build
        env:
          VITE_BASE_URL: '/grippo-site/'

      - name: Upload Pages artifact
        # Артефакт загружается только из ветки main
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ─── JOB 2: Deploy (только main) ─────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
